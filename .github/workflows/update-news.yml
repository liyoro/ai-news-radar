name: Update AI News Radar

on:
  schedule:
    # 每天北京时间 08:00 和 20:00 自动更新
    - cron: '0 0 * * *'
    # 每天 UTC 00:00 和 12:00 = 北京时间 08:00 和 20:00
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches: [master, main]

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests feedformatter
          pip install -q beautifulsoup4 lxml

      # ── OPML 处理 ──────────────────────────────────────────────
      # 优先使用 FOLLOW_OPML_B64（用户私有订阅）
      # 未配置时使用仓库内的 follow.example.opml
      - name: Prepare OPML
        run: |
          if [[ "${{ secrets.FOLLOW_OPML_B64 }}" != "" ]]; then
            echo "${{ secrets.FOLLOW_OPML_B64 }}" | base64 -d > feeds/follow.opml
            echo "✓ 使用私有 FOLLOW_OPML_B64"
          else
            cp feeds/follow.example.opml feeds/follow.opml
            echo "✓ 使用示例 OPML（公开默认信源）"
          fi

      - name: Run news update
        env:
          # AgentMail 可选，默认关闭；密钥仅存在 GitHub Secrets
          EMAIL_DIGEST_ENABLED: ${{ vars.EMAIL_DIGEST_ENABLED || '0' }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY || '' }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID || '' }}
          EMAIL_DIGEST_PUBLISH: ${{ vars.EMAIL_DIGEST_PUBLISH || '0' }}
          # Jina Reader 可选，用于超时信源兜底
          JINA_API_KEY: ${{ secrets.JINA_API_KEY || '' }}
        run: |
          python scripts/update_news.py \
            --output-dir data \
            --window-hours 24 \
            --rss-opml feeds/follow.opml \
            --archive-days 7

      - name: Commit & push data
        uses: EndBug/add-and-commit@v9
        with:
          add: data/
          message: "🤖 Auto-update $(date +'%Y-%m-%d %H:%M')"
          # 只推 data/ 目录，不碰其他文件
          skip-dir: |
            .github
            scripts
            assets
            index.html
